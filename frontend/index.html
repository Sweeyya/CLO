<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLO - Carbon Aware AI</title>
  <style>
    body {
      font-family: "Inter", sans-serif;
      background: radial-gradient(circle at top, #0a192f, #000);
      color: #f0f0f0;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 1px;
      font-size: 28px;
    }

    p.subtitle {
      color: #91ddff;
      margin-bottom: 32px;
      font-size: 16px;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 24px 32px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    textarea {
      width: 100%;
      height: 80px;
      border-radius: 8px;
      border: none;
      padding: 12px;
      font-size: 15px;
      margin-bottom: 12px;
      resize: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    button {
      background-color: #91ddff;
      color: #000;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background-color: #c8f7ff;
    }

    .result {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.08);
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .loading {
      font-style: italic;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>CLO</h1>
  <p class="subtitle">Carbon-Aware AI Inference Tracker</p>

  <div class="container">
    <textarea id="prompt" placeholder="Type your AI prompt here..."></textarea>
    <button id="run">Run Inference</button>
    <div id="result" class="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
